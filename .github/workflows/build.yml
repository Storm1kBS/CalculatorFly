name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - run: sudo apt-get update
    - run: sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev python3-pip openjdk-11-jdk ant git wget unzip
    - run: pip install buildozer cython kivy kivymd
    - run: buildozer android debug
      timeout-minutes: 120
    - uses: actions/upload-artifact@v3
      with:
        name: calculator-apk
        path: bin/*.apk
