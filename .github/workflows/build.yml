name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev python3-pip openjdk-11-jdk openjdk-11-jdk-headless ant git wget unzip libncurses5

    - name: Install Python packages
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython kivy kivymd

    - name: Build APK
      run: buildozer android debug
      timeout-minutes: 120

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v3
      with:
        name: calculator-apk
        path: bin/*.apk
