name: Build APK
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system deps
      run: sudo apt-get update && sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev python3-pip openjdk-11-jdk ant git wget unzip libncurses5 libx11-6

    - name: Install Python deps
      run: pip install buildozer cython kivy kivymd

    - name: Build
      run: buildozer android debug
      timeout-minutes: 120

    - name: Upload
      uses: actions/upload-artifact@v3
      with:
        name: calculator-apk
        path: bin/calculator-1.0-debug.apk
        if-no-files-found: warn
